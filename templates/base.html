<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gene Ontology Analysis System</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1a7164;
            color: rgb(10, 60, 52);
        }

        header {
            background-color: #00594a;
            color: rgb(3, 36, 30);
            padding: 24px 16px;
            text-align: center;
        }

        main {
            max-width: 900px;
            margin: 24px auto;
            padding: 20px;
        }

        .card {
            background-color: #04a577;
            border: 1px solid #023b44;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .nav {
            margin-top: 16px;
        }

        .nav a {
            text-decoration: none;
            margin: 0 4px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        input[type="file"],
        input[type="text"] {
            width: 100%;
            margin-bottom: 12px;
            padding: 8px;
            box-sizing: border-box;
        }

        button {
            background-color: #00796b;
            color: rgb(0, 65, 49);
            border: none;
            padding: 10px 16px;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #004d40;
        }

        ul {
            padding-left: 20px;
        }

        .flash {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 14px;
            font-weight: bold;
        }

        .flash.success {
            background-color: #8ee6c7;
            border: 1px solid #0d6b4f;
        }

        .flash.error {
            background-color: #f7b6b6;
            border: 1px solid #8b2f2f;
            color: #5e1010;
        }

        .small-text {
            font-size: 0.9em;
        }
    </style>
</head>
<body>

<header>
    <h1>Gene Ontology Analysis System</h1>

    <div class="nav">
        <a href="{{ url_for('home') }}"><button>Home</button></a>
        <a href="{{ url_for('upload') }}"><button>Upload</button></a>
        <a href="{{ url_for('search') }}"><button>Search</button></a>
        <a href="{{ url_for('stats') }}"><button>Statistics</button></a>
        <a href="{{ url_for('similarity') }}"><button>Similarity</button></a>
    </div>
</header>

<main>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash {{ category }}">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
</main>
</body>
</html>
